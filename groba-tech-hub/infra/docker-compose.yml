version: '3.8'

services:
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: grobatech_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    depends_on:
      - api

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: grobatech_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://grobatech:grobatech@db:5432/groba_db
    volumes:
      - ../apps/api:/app
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: grobatech_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=grobatech
      - POSTGRES_PASSWORD=grobatech
      - POSTGRES_DB=groba_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    container_name: grobatech_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
